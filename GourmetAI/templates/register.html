{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 animated-fade-in">
    <div class="col-lg-5 col-md-8 col-sm-10">
        <div class="glass-container p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-plus text-primary-gradient fs-1 mb-2"></i>
                <h2 class="mb-1">Create Account</h2>
                <p class="text-muted">Register to predict ratings and save your favorites</p>
            </div>
            
            <form action="{{ url_for('register') }}" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label text-muted small fw-semibold text-uppercase">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25 text-muted">
                            <i class="fa-regular fa-user"></i>
                        </span>
                        <input type="text" class="form-control form-control-glass border-start-0" id="name" name="name" placeholder="John Doe" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label text-muted small fw-semibold text-uppercase">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25 text-muted">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input type="email" class="form-control form-control-glass border-start-0" id="email" name="email" placeholder="john@example.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label text-muted small fw-semibold text-uppercase">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary border-opacity-25 text-muted">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" class="form-control form-control-glass border-start-0" id="password" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary-gradient py-2">
                        <i class="fa-solid fa-user-plus me-1"></i> Register Account
                    </button>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <span class="text-muted small">Already have an account? </span>
                <a href="{{ url_for('login') }}" class="text-decoration-none small text-bright fw-semibold">Login here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
